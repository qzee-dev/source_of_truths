server {
    listen 80;
    server_name _;

    # Root of your built frontend
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------
    # 1. Proxy API requests to backend container or external API server
    # -------------------------------
    # If backend is in Docker Compose:
    # proxy_pass http://backend:5000;

    # If backend is in another EC2:
    # proxy_pass http://198.90.80.1:5000;

    location /api/ {
        proxy_pass http://backend:5000;   # Change this if backend lives elsewhere

        # preserve headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (optional)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # -------------------------------
    # 2. Serve Frontend (SPA Fallback)
    # -------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------
    # 3. Security Headers
    # -------------------------------
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # -------------------------------
    # 4. Enable gzip compression
    # -------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 256;
}